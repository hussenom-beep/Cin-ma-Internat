<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<!-- Mobile First : on cadre le viewport sur la largeur de l'appareil -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Cafette du lycée</title>
<meta name="theme-color" content="#1E5FC0" />
<!-- Plein écran iPhone : le contenu (header) passe sous la barre d'état -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<!-- ============================================================= -->
<!-- POLICES (Google Fonts)                                         -->
<!-- Fredoka  = police d'affichage ronde et gourmande (titres, prix) -->
<!-- Inter    = police de lecture, claire et moderne (textes)        -->
<!-- ============================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<!-- ============================================================= -->
<!-- LIBRAIRIES EXTERNES (CDN)                                      -->
<!-- supabase-js : connexion à la base de données et au stockage    -->
<!-- Cropper.js  : recadrage manuel des photos côté admin           -->
<!-- ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>

<style>
/* ================================================================= */
/*  1. DESIGN TOKENS — toutes les couleurs et variables au même endroit */
/* ================================================================= */
:root{
  /* Couleurs de marque : palette gourmande / fast-food moderne */
  --bg:        #FFFBF5;   /* fond crème chaud */
  --surface:   #FFFFFF;   /* cartes, barres */
  --ink:       #1A1410;   /* texte principal (presque noir chaud) */
  --muted:     #8A8178;   /* texte secondaire */
  --line:      #F0E8DD;   /* séparateurs discrets */

  --primary:   #0E5AD6;   /* bleu royal (refonte : boutons, onglets actifs, focus) */
  --primary-d: #0B47A8;   /* bleu royal foncé (survol/appui) */
  --accent:    #FFB627;   /* jaune ambré (badges, soulignés) */
  --fresh:     #2DBE6C;   /* vert frais (badge "Nouveau") */
  --danger:    #E5484D;   /* rouge alerte (suppression) */

  /* === Palette de marque "Cafet' 2 Malad'" (refonte visuelle) === */
  --navy:      #001F60;   /* bleu marine du fond */
  --navy-deep: #010726;   /* bleu très sombre (voiles, bords) */
  --blue:      #0E5AD6;   /* bleu royal (interactif, pastille active) */
  --sky:       #CEE5F5;   /* bleu clair (header) */
  --red:       #A62628;   /* rouge du logo (prix, accents forts) */
  --gold:      #CDB079;   /* doré du logo (étoile, filets premium) */
  --card:      #F4F8FF;   /* blanc bleuté translucide des cartes */

  /* Formes & ombres */
  --r-lg: 22px;
  --r-md: 16px;
  --r-sm: 11px;
  --shadow:    0 8px 24px rgba(26,20,16,.08);
  --shadow-s:  0 2px 8px rgba(26,20,16,.06);

  /* Largeur max sur grand écran (l'appli reste "mobile" centrée) */
  --maxw: 520px;
}

/* ================================================================= */
/*  2. RESET / BASE                                                   */
/* ================================================================= */
*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  /* gère les encoches (iPhone) */
  padding-bottom:env(safe-area-inset-bottom);
}
img{ display:block; max-width:100%; }
button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input,textarea,select{ font-family:inherit; font-size:16px; } /* 16px = pas de zoom auto iOS */

/* Conteneur principal : tout est centré dans une colonne "mobile" */
.app{ max-width:var(--maxw); margin:0 auto; min-height:100vh; background:var(--bg); position:relative; }

/* Utilitaire : masquer un élément */
.hidden{ display:none !important; }

/* ================================================================= */
/*  3. EN-TÊTE PUBLIC + BANNIÈRE "PRODUIT DU MOMENT"                  */
/* ================================================================= */
.topbar{
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:space-between; gap:4px;
  /* Le padding-top inclut l'encoche iPhone : le ciel remonte jusqu'en haut */
  padding:14px 8px 12px;
  padding-top:calc(16px + env(safe-area-inset-top));
  min-height:150px;
  background:#9cc6ef url("fond_header.png") center center / cover no-repeat;
  border-radius:0 0 var(--r-lg) var(--r-lg);
  box-shadow:0 8px 22px rgba(0,12,45,.40);
}
/* Mascottes (Léo à gauche, Régis à droite) : tailles fluides, ombre douce */
.topbar__mascot{
  flex:none; width:auto; height:clamp(76px, 23vw, 108px);
  filter:drop-shadow(0 5px 7px rgba(0,18,55,.38));
  -webkit-user-select:none; user-select:none; pointer-events:none;
}
/* Logo centré, vedette de l'en-tête */
.topbar__logo-wrap{ flex:1; min-width:0; display:flex; justify-content:center; }
.topbar__logo-img{
  width:clamp(180px, 60vw, 300px); height:auto; max-width:100%;
  filter:drop-shadow(0 3px 5px rgba(0,0,0,.18));
}

/* La grande bannière met en avant le "produit du moment" */
.hero{ padding:4px 14px 0; }
.hero__card{
  position:relative; border-radius:var(--r-lg); overflow:hidden;
  box-shadow:var(--shadow); background:#2a2118; aspect-ratio:16/10;
}
.hero__img{ width:100%; height:100%; object-fit:cover; opacity:.92; }
.hero__overlay{
  position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,0) 30%,rgba(0,0,0,.72) 100%);
}
.hero__content{ position:absolute; left:18px; right:18px; bottom:16px; color:#fff; }
.hero__tag{
  display:inline-block; background:var(--accent); color:#1A1410;
  font-family:'Fredoka'; font-weight:600; font-size:12px;
  padding:5px 11px; border-radius:999px; margin-bottom:8px;
}
.hero__title{ font-family:'Fredoka'; font-weight:600; font-size:25px; line-height:1.1; }
.hero__desc{ font-size:13.5px; opacity:.9; margin-top:3px; max-width:80%; }
.hero__price{
  position:absolute; right:14px; bottom:14px;
  background:var(--primary); color:#fff; font-family:'Fredoka'; font-weight:600;
  font-size:18px; padding:8px 14px; border-radius:14px; box-shadow:var(--shadow);
}
.hero__empty{
  display:grid; place-items:center; height:100%; color:#fff; font-family:'Fredoka';
  font-size:16px; text-align:center; padding:20px;
}

/* Carrousel : piste défilante avec accroche (snap) sur chaque diapo */
.hero__carousel{ position:relative; }
.hero__track{
  display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
  border-radius:var(--r-lg); box-shadow:var(--shadow);
  scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
.hero__track::-webkit-scrollbar{ display:none; }
.hero__slide{
  position:relative; flex:0 0 100%; scroll-snap-align:start;
  aspect-ratio:16/10; background:#2a2118; overflow:hidden;
}
/* Points indicateurs */
.hero__dots{ display:flex; justify-content:center; gap:6px; margin-top:9px; }
.hero__dot{ width:7px; height:7px; border-radius:50%; background:#e3d8c8; transition:.25s; cursor:pointer; }
.hero__dot.is-active{ background:var(--primary); width:18px; border-radius:4px; }
/* Produit du moment indisponible : image grisée + pastille rouge */
.hero__slide.is-unavailable .hero__img{ filter:grayscale(1) brightness(.78); }
.hero__off{
  display:inline-block; vertical-align:middle; margin-left:7px;
  background:var(--red); color:#fff; font-family:'Fredoka'; font-weight:600;
  font-size:12px; padding:4px 11px; border-radius:999px;
  border:2px solid rgba(255,255,255,.9); box-shadow:0 2px 6px rgba(0,0,0,.3);
}

/* ================================================================= */
/*  4. BARRE STICKY DE CATÉGORIES (scroll horizontal + scroll-spy)   */
/* ================================================================= */
.catbar{
  position:sticky; top:0; z-index:40;
  background:var(--bg); padding:12px 0 10px;
  /* léger flou/dégradé pour la lisibilité au défilement */
  box-shadow:0 6px 14px -10px rgba(26,20,16,.25);
}
.catbar__scroll{
  display:flex; gap:9px; overflow-x:auto; padding:0 14px;
  scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
.catbar__scroll::-webkit-scrollbar{ display:none; }
.catpill{
  flex:none; display:flex; align-items:center; gap:6px;
  padding:9px 15px; border-radius:999px;
  background:var(--surface); color:var(--ink);
  font-weight:600; font-size:14px; white-space:nowrap;
  border:1.5px solid var(--line); transition:.18s;
}
.catpill.is-active{
  background:var(--ink); color:#fff; border-color:var(--ink);
}
.catpill__emoji{ font-size:16px; }

/* ================================================================= */
/*  5. SECTIONS + CARTES PRODUITS                                     */
/* ================================================================= */
.menu{ padding:8px 14px 40px; }
.section{ scroll-margin-top:64px; padding-top:18px; } /* décalage pour la barre sticky */
.section__title{
  font-family:'Fredoka'; font-weight:600; font-size:20px;
  display:flex; align-items:center; gap:8px; margin-bottom:12px;
}

.card{
  display:flex; gap:14px; background:var(--surface);
  border-radius:var(--r-md); padding:11px; margin-bottom:12px;
  box-shadow:var(--shadow-s); position:relative; overflow:hidden;
}
/* Carte indisponible : photo en noir & blanc + bandeau rouge en travers */
.card.is-unavailable .card__media img{ filter:grayscale(1) brightness(.95); }
.card__unavail{
  position:absolute; top:50%; left:-14%; right:-14%;
  transform:translateY(-50%) rotate(-11deg);
  background:rgba(166,38,40,.94); color:#fff;
  text-align:center; text-transform:uppercase;
  font-size:10px; font-weight:700; letter-spacing:.6px;
  padding:4px 0; z-index:2; box-shadow:0 2px 6px rgba(0,0,0,.35);
}
.card__media{
  width:104px; height:104px; flex:none; border-radius:var(--r-sm);
  overflow:hidden; background:var(--line); position:relative;
}
.card__media img{ width:100%; height:100%; object-fit:cover; }
.card__media--empty{ display:grid; place-items:center; font-size:30px; }

.card__body{ flex:1; min-width:0; display:flex; flex-direction:column; }
.card__name{ font-family:'Fredoka'; font-weight:600; font-size:16.5px; line-height:1.2; }
.card__desc{
  font-size:13px; color:var(--muted); margin-top:3px;
  /* description sur 2 lignes max */
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.card__allerg{ font-size:11.5px; color:var(--muted); margin-top:6px; }
.card__allerg b{ color:var(--ink); font-weight:600; }
.card__footer{ margin-top:auto; padding-top:8px; display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.card__price{
  font-family:'Fredoka'; font-weight:700; font-size:18px; color:var(--primary);
}

/* Pastilles / badges */
.badges{ position:absolute; top:8px; left:8px; display:flex; gap:5px; flex-wrap:wrap; z-index:2; }
.badge{
  font-size:10px; font-weight:700; padding:3px 7px; border-radius:999px;
  color:#fff; letter-spacing:.2px; box-shadow:var(--shadow-s); line-height:1.3;
}
.badge--new{ background:var(--fresh); }
.badge--off{ background:var(--red); }
/* Pastille étoile compacte pour "produit du moment" */
/* Pastille étoile compacte pour "produit du moment" */
.badge--star{
  background:#FFCE1F; color:#4a2e00; padding:0; line-height:1;
  width:24px; height:24px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center; font-size:13px;
  border:2px solid #fff; box-shadow:0 1px 5px rgba(0,0,0,.30);
}

/* État vide (aucun produit) */
.empty-state{ text-align:center; color:var(--muted); padding:60px 24px; }
.empty-state__emoji{ font-size:44px; margin-bottom:10px; }

/* Pied de page public */
.foot{ text-align:center; color:var(--muted); font-size:12px; padding:24px 0 34px; }

/* ================================================================= */
/*  6. PANNEAU D'ADMINISTRATION                                       */
/* ================================================================= */
.admin{ background:var(--bg); }
.admin__bar{
  position:sticky; top:0; z-index:50; background:var(--ink); color:#fff;
  display:flex; align-items:center; gap:10px; padding:13px 16px;
}
.admin__bar h1{ font-family:'Fredoka'; font-size:17px; font-weight:600; flex:1; }
.admin__tabs{ display:flex; gap:6px; padding:12px 14px 4px; position:sticky; top:50px; background:var(--bg); z-index:40; }
.tab{
  flex:1; padding:10px; border-radius:12px; background:var(--surface);
  border:1.5px solid var(--line); font-weight:600; font-size:13.5px; color:var(--muted);
}
.tab.is-active{ background:var(--primary); color:#fff; border-color:var(--primary); }
.admin__panel{ padding:8px 14px 50px; }

/* Boutons génériques */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  padding:12px 16px; border-radius:13px; font-weight:600; font-size:15px; transition:.15s;
}
.btn--primary{ background:var(--primary); color:#fff; }
.btn--primary:active{ background:var(--primary-d); }
.btn--ghost{ background:var(--surface); border:1.5px solid var(--line); color:var(--ink); }
.btn--ghost-light{ background:rgba(255,255,255,.16); color:#fff; }
.btn--danger{ background:var(--danger); color:#fff; }
.btn--block{ width:100%; }
.btn--sm{ padding:8px 12px; font-size:13px; border-radius:10px; }

/* Lignes de gestion (produit / catégorie) */
.row{
  display:flex; align-items:center; gap:11px; background:var(--surface);
  border:1.5px solid var(--line); border-radius:var(--r-md); padding:10px; margin-bottom:10px;
}
.row.is-hidden-item{ opacity:.55; border-style:dashed; }
.row__thumb{ width:52px; height:52px; border-radius:11px; object-fit:cover; background:var(--line); flex:none; display:grid; place-items:center; font-size:22px; }
.row__main{ flex:1; min-width:0; }
.row__name{ font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row__meta{ font-size:12px; color:var(--muted); }
.row__price{ font-family:'Fredoka'; font-weight:600; color:var(--primary); }
.row__actions{ display:flex; gap:4px; align-items:center; }
.iconbtn{ width:34px; height:34px; border-radius:10px; background:var(--bg); display:grid; place-items:center; font-size:16px; border:1.5px solid var(--line); }
.reorder{ display:flex; flex-direction:column; gap:2px; }
.reorder button{ width:30px; height:22px; border-radius:7px; background:var(--bg); border:1.5px solid var(--line); display:grid; place-items:center; font-size:12px; }

.section-head{ display:flex; align-items:center; justify-content:space-between; margin:6px 0 12px; }
.section-head h2{ font-family:'Fredoka'; font-size:18px; }

/* Accordéon des catégories (admin Produits) */
.acc{ margin-bottom:14px; }
.acc__head{
  width:100%; display:flex; align-items:center; gap:10px; padding:12px 13px;
  background:var(--surface); border:1.5px solid var(--line); border-radius:var(--r-md);
  font-weight:600; font-size:15px; text-align:left;
}
.acc__head:active{ background:var(--bg); }
.acc__chev{ color:var(--muted); font-size:12px; width:14px; text-align:center; flex:none; }
.acc__title{ flex:1; }
.acc__count{ background:var(--line); color:var(--muted); font-size:12px; font-weight:600; padding:2px 9px; border-radius:999px; flex:none; }
.acc__body{ padding:10px 0 0; }

/* ================================================================= */
/*  7. FORMULAIRES (champs)                                           */
/* ================================================================= */
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
.field input[type=text],
.field input[type=number],
.field input[type=email],
.field input[type=password],
.field textarea,
.field select{
  width:100%; padding:12px 13px; border-radius:12px;
  border:1.5px solid var(--line); background:var(--surface); color:var(--ink);
}
.field textarea{ resize:vertical; min-height:74px; }
.field input:focus,.field textarea:focus,.field select:focus{ outline:2px solid var(--primary); border-color:var(--primary); }
.field--row{ display:flex; gap:12px; }
.field--row > div{ flex:1; }

/* Cases à cocher (badges) */
.checks{ display:flex; flex-wrap:wrap; gap:8px; }
.check{
  display:flex; align-items:center; gap:7px; padding:9px 12px;
  border:1.5px solid var(--line); border-radius:11px; background:var(--surface); font-size:13.5px; font-weight:500;
}
.check input{ width:18px; height:18px; accent-color:var(--primary); }

/* ================================================================= */
/*  8. PHOTO (aperçu + zone d'upload)                                 */
/* ================================================================= */
.photo-box{
  border:2px dashed var(--line); border-radius:var(--r-md);
  padding:14px; text-align:center; background:var(--surface);
}
.photo-preview{ width:140px; height:140px; border-radius:14px; object-fit:cover; margin:0 auto 12px; background:var(--line); }
.photo-actions{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }

/* ================================================================= */
/*  9. MODALES (connexion, éditeur, recadrage)                       */
/* ================================================================= */
.modal{
  position:fixed; inset:0; z-index:100; background:rgba(20,15,11,.55);
  display:flex; align-items:flex-end; justify-content:center; padding:0;
  backdrop-filter:blur(2px);
}
.modal__panel{
  background:var(--bg); width:100%; max-width:var(--maxw);
  border-radius:24px 24px 0 0; max-height:94vh; overflow-y:auto;
  padding:20px 18px calc(26px + env(safe-area-inset-bottom));
  animation:slideUp .22s ease;
}
@keyframes slideUp{ from{ transform:translateY(28px); opacity:.4; } to{ transform:none; opacity:1; } }
.modal__head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.modal__head h3{ font-family:'Fredoka'; font-size:19px; }
.modal__close{ width:36px; height:36px; border-radius:11px; background:var(--surface); border:1.5px solid var(--line); font-size:18px; }
.modal__footer{ display:flex; gap:10px; margin-top:18px; }

/* Zone de recadrage Cropper.js */
.crop-wrap{ width:100%; max-height:60vh; background:#000; border-radius:14px; overflow:hidden; }
.crop-wrap img{ max-width:100%; }

/* Petit message d'erreur / info */
.note{ font-size:13px; padding:10px 12px; border-radius:11px; margin-top:10px; }
.note--err{ background:#fdecec; color:var(--danger); }
.note--ok{ background:#e7f7ee; color:var(--fresh); }

/* Bandeau "mode aperçu" affiché par-dessus la vue publique */
.preview-bar{
  position:fixed; left:50%; transform:translateX(-50%); bottom:18px; z-index:90;
  background:var(--ink); color:#fff; padding:10px 14px; border-radius:14px;
  display:flex; align-items:center; gap:10px; box-shadow:var(--shadow); font-size:14px;
  width:calc(100% - 28px); max-width:calc(var(--maxw) - 28px); justify-content:space-between;
}

/* Loader simple */
.loader{ display:grid; place-items:center; min-height:60vh; color:var(--muted); }
.spinner{ width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px; }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* Accessibilité : on respecte la préférence "moins d'animations" */
@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; scroll-behavior:auto !important; }
}

/* ================================================================= */
/*  ÉTAPE 1 — FONDATIONS : fond marine global (fond.png) + lisibilité */
/*  (refonte visuelle — n'affecte que le décor et la couleur de texte) */
/* ================================================================= */

/* Fond marine global, FIXE derrière toute l'appli.
   On utilise un calque position:fixed (et non background-attachment:fixed,
   peu fiable sur mobile) pour un vrai fond fixe partout. */
body::before{
  content:""; position:fixed; inset:0; z-index:-2;
  background:#001F60 url("fond.png") center center / cover no-repeat;
}
/* Voile dégradé : crée de la profondeur et garde les textes clairs lisibles */
body::after{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:linear-gradient(180deg, rgba(0,15,50,.28) 0%, rgba(1,7,38,.55) 100%);
}

/* L'appli devient transparente : le marine apparaît entre les cartes
   qui semblent ainsi "flotter" au-dessus du décor. */
/* Marine comme couleur de secours sur <html> : la zone derrière la barre
   d'état iPhone (et tout bord non couvert) devient marine au lieu de blanc. */
html{ background:var(--navy); }
body{ background:transparent; }
.app{ background:transparent; }

/* Textes posés directement sur le marine → passage en clair pour rester lisibles
   (le contenu des cartes, lui, reste en couleurs sombres sur fond clair). */
.section__title{ color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.35); }
.topbar__name{ color:#fff; }
.topbar__sub{ color:rgba(255,255,255,.82); }
.foot{ color:rgba(255,255,255,.72); }
.empty-state{ color:rgba(255,255,255,.85); }
.menu-empty{ color:rgba(255,255,255,.78); font-size:13px; }

/* ================================================================= */
/*  ÉTAPE 3 — CARTES PRODUITS + PRIX (refonte visuelle)              */
/* ================================================================= */

/* Cartes : blanc bleuté légèrement translucide (verre dépoli),
   filet doré discret, ombre marquée pour l'effet "flottant" sur le marine. */
.card{
  background:rgba(238,245,255,.92);
  -webkit-backdrop-filter:blur(8px) saturate(1.05);
  backdrop-filter:blur(8px) saturate(1.05);
  border:1px solid rgba(205,176,121,.45);   /* filet doré */
  box-shadow:0 12px 28px rgba(0,12,45,.34);
}
/* Texte des cartes en bleu marine + gris ardoise (plus froid, plus premium) */

// Transforme le texte "Titre: a, b, c" (une famille par ligne) en étiquettes groupées

}

/* Gère la barre de catégories : clic = défilement, et surlignage automatique.
   On se base sur la POSITION de défilement (et non plus sur une bande au milieu
   de l'écran) : c'est fiable même quand des catégories sont courtes ou vides. */
function setupCategoryNav(){
  const pills = [...document.querySelectorAll(".catpill")];
  if(!pills.length) return;
  const sections = pills.map(p => document.getElementById(p.dataset.target)).filter(Boolean);

  // Surligne une pastille et la garde visible au centre de la barre
  function setActive(id){
    pills.forEach(p => {
      const on = p.dataset.target === id;
      if(on && !p.classList.contains("is-active")){
        p.scrollIntoView({ inline:"center", block:"nearest", behavior:"smooth" });
      }
      p.classList.toggle("is-active", on);
    });
  }

  // Pendant un clic, on ignore brièvement le scroll-spy (évite le clignotement)
  let lockUntil = 0;

  // Clic sur une pastille → surlignage immédiat + défilement vers la section
  pills.forEach(pill => {
    pill.addEventListener("click", () => {
      const target = document.getElementById(pill.dataset.target);
      if(!target) return;
      setActive(pill.dataset.target);
      lockUntil = Date.now() + 700;
      target.scrollIntoView({ behavior:"smooth", block:"start" });
    });
  });

  // Détermine la catégorie active selon la position de défilement
  function onScroll(){
    if(Date.now() < lockUntil) return;
    const threshold = 110; // ligne de référence, juste sous la barre sticky

    // Cas particulier : si on est tout en bas de la page, c'est la dernière catégorie
    if(window.innerHeight + window.scrollY >= document.body.scrollHeight - 4){
      setActive(sections[sections.length - 1].id);
      return;
    }
    // Sinon : la dernière section dont le haut est passé au-dessus de la ligne
    let current = sections[0];
    for(const s of sections){
      if(s.getBoundingClientRect().top <= threshold) current = s;
      else break;
    }
    setActive(current.id);
  }

  window.addEventListener("scroll", onScroll, { passive:true });
  onScroll(); // état initial au chargement
}

/* Carrousel de la bannière : défilement manuel (doigt) + automatique.
   - démarre seulement s'il y a au moins 2 produits du moment
   - se met en pause dès que l'utilisateur interagit, reprend après un délai
   - respecte la préférence "réduire les animations" du téléphone */
let heroTimer = null;
function setupHeroCarousel(){
  if(heroTimer){ clearInterval(heroTimer); heroTimer = null; } // évite les doublons entre rendus
  const track = document.getElementById("heroTrack");
  if(!track) return;
  const slides = [...track.children];
  const dotsWrap = document.getElementById("heroDots");
  const dots = dotsWrap ? [...dotsWrap.children] : [];
  if(slides.length < 2) return; // rien à animer avec une seule diapo

  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  let index = 0;
  let resumeT = null;

  function goTo(i){
    index = (i + slides.length) % slides.length;
    track.scrollTo({ left: slides[index].offsetLeft, behavior:"smooth" });
  }
  function goNext(){ goTo(index + 1); }

  // Synchronise les points avec la position réelle de défilement
  function syncDots(){
    const i = Math.round(track.scrollLeft / track.clientWidth);
    index = i;
    dots.forEach((d,k) => d.classList.toggle("is-active", k === i));
  }
  function start(){ if(reduced) return; stop(); heroTimer = setInterval(goNext, 4500); }
  function stop(){ if(heroTimer){ clearInterval(heroTimer); heroTimer = null; } }

  track.addEventListener("scroll", syncDots, { passive:true });
  // Pause quand l'utilisateur touche / survole la bannière
  ["pointerdown","touchstart","mouseenter"].forEach(ev =>
    track.addEventListener(ev, () => { stop(); clearTimeout(resumeT); }, { passive:true }));
  // Reprise un court instant après la fin de l'interaction
  ["pointerup","touchend","mouseleave"].forEach(ev =>
    track.addEventListener(ev, () => { clearTimeout(resumeT); resumeT = setTimeout(start, 3500); }, { passive:true }));
  // Clic sur un point → va à la diapo correspondante
  dots.forEach((d,k) => d.addEventListener("click", () => {
    stop(); goTo(k); clearTimeout(resumeT); resumeT = setTimeout(start, 3500);
  }));

  start();
}

  const note = $("#resetNote");

  if(!email){ note.innerHTML = `<div class="note note--err">Renseignez votre adresse e-mail.</div>`; return; }
  btn.disabled = true; btn.textContent = "Envoi…";
  // Le lien reçu renverra vers le site (avec ?admin=1), puis l'écran "nouveau mot de passe"
  const redirectTo = location.origin + location.pathname + "?admin=1";
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
  btn.disabled = false; btn.textContent = "Envoyer le lien";
  if(error) console.error(error);
  // Message volontairement identique en cas de succès ou de compte introuvable (sécurité)
  note.innerHTML = `<div class="note note--ok">Si un compte existe pour cette adresse, un e-mail vient d'être envoyé. Pensez à vérifier les spams.</div>`;
}

async function doRecovery(){
  const np = $("#recNew").value, cf = $("#recConfirm").value, note = $("#recNote");
  if(np.length < 6){ note.innerHTML = `<div class="note note--err">Le mot de passe doit faire au moins 6 caractères.</div>`; return; }
  if(np !== cf){ note.innerHTML = `<div class="note note--err">Les deux mots de passe ne correspondent pas.</div>`; return; }
  const btn = $("#recBtn"); btn.disabled = true; btn.textContent = "Validation…";
  const { error } = await sb.auth.updateUser({ password: np });
  btn.disabled = false; btn.textContent = "Valider le nouveau mot de passe";
  if(error){ note.innerHTML = `<div class="note note--err">${escapeHtml(error.message)}</div>`; return; }
  // On nettoie l'URL (retire le jeton) et on entre directement dans l'administration
  history.replaceState(null, "", location.pathname + "?admin=1");
  state.isAdmin = true;
  closeModal();
  enterAdmin();
}

function enterAdmin(){

function renderAdmin(){
  // Si l'aperçu public est activé, on montre la vue publique + un bandeau de retour
  if(state.previewMode){
    renderPublic();
    const bar = document.createElement("div");

    bar.innerHTML = `<span>👀 Aperçu public</span>

  app.innerHTML = `

        <h1>⚙️ Administration</h1>

/* ----------------------- GESTION DES PRODUITS ----------------------- */
function renderAdminProducts(){
  const panel = $("#adminPanel");

  // On regroupe les produits par catégorie (dans l'ordre des catégories)
  const groups = state.categories.map(c => ({
    id: c.id, name: c.name, emoji: c.emoji || "🍽️",
    items: state.products
      .filter(p => p.category_id === c.id)
      .sort((a,b) => (a.position||0) - (b.position||0))
  }));
  // Produits dont la catégorie n'existe plus / est nulle → groupe "Sans catégorie"
  const orphans = state.products
    .filter(p => !state.categories.some(c => c.id === p.category_id))
    .sort((a,b) => (a.position||0) - (b.position||0));
  if(orphans.length) groups.push({ id:"__none__", name:"Sans catégorie", emoji:"❓", items:orphans });

  let html = `<div class="section-head">
    <h2>Produits (${state.products.length})</h2>
    <button class="btn btn--primary btn--sm" id="addProduct">+ Ajouter</button>
  </div>`;

  if(!state.products.length){
    html += `<div class="empty-state"><div class="empty-state__emoji">🍔</div>Aucun produit. Ajoutez-en un !</div>`;
  } else {
    // Bouton pour tout replier / tout déplier d'un coup
    html += `<button class="btn btn--ghost btn--sm" id="toggleAll" style="margin-bottom:12px;">${collapsedCats.size ? "Tout déplier" : "Tout replier"}</button>`;
  }

  // Un "accordéon" par catégorie
  groups.forEach(g => {
    const collapsed = collapsedCats.has(g.id);
    html += `<div class="acc">
      <button class="acc__head" data-cat="${g.id}">
        <span class="acc__chev">${collapsed ? "▸" : "▾"}</span>
        <span class="acc__title">${escapeHtml(g.emoji)} ${escapeHtml(g.name)}</span>
        <span class="acc__count">${g.items.length}</span>
      </button>
      <div class="acc__body ${collapsed ? "hidden" : ""}">`;

    if(!g.items.length){
      html += `<p style="color:var(--muted);font-size:13px;padding:2px 2px 6px;">Aucun produit dans cette catégorie.</p>`;
    }
    g.items.forEach((p, idx) => {
      html += `<div class="row ${p.is_hidden?"is-hidden-item":""}">
        <div class="reorder">
          <button data-pmove="up" data-id="${p.id}" ${idx===0?"disabled":""}>▲</button>
          <button data-pmove="down" data-id="${p.id}" ${idx===g.items.length-1?"disabled":""}>▼</button>
        </div>
        <div class="row__thumb">${p.image_url?`<img src="${escapeHtml(p.image_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:11px;">`:"🍽️"}</div>
        <div class="row__main">
          <div class="row__name">${escapeHtml(p.name)} ${p.is_new?"🆕":""} ${p.is_featured?"⭐":""}</div>
          <div class="row__meta"><span class="row__price">${euro(p.price)}</span> ${!p.is_available?"· ⛔ indispo":""}</div>
        </div>
        <div class="row__actions">
          <button class="iconbtn" data-toggle-hide="${p.id}" title="${p.is_hidden?"Afficher":"Masquer"}">${p.is_hidden?"🙈":"👁️"}</button>
          <button class="iconbtn" data-edit="${p.id}" title="Modifier">✏️</button>
          <button class="iconbtn" data-del="${p.id}" title="Supprimer">🗑️</button>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  panel.innerHTML = html;

  $("#addProduct").addEventListener("click", () => openProductEditor(null));
  // Tout replier / tout déplier
  const toggleAll = $("#toggleAll");
  if(toggleAll) toggleAll.addEventListener("click", () => {
    if(collapsedCats.size) collapsedCats.clear();
    else groups.forEach(g => collapsedCats.add(g.id));
    renderAdminProducts();
  });
  // Replier / déplier une catégorie
  panel.querySelectorAll("[data-cat]").forEach(b => b.addEventListener("click", () => {
    const id = b.dataset.cat;
    if(collapsedCats.has(id)) collapsedCats.delete(id); else collapsedCats.add(id);
    renderAdminProducts();
  }));
  panel.querySelectorAll("[data-edit]").forEach(b => b.addEventListener("click", () => openProductEditor(b.dataset.edit)));
  panel.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", () => deleteProduct(b.dataset.del)));
  panel.querySelectorAll("[data-toggle-hide]").forEach(b => b.addEventListener("click", () => toggleProductHidden(b.dataset.toggleHide)));
  // Réordonnancement À L'INTÉRIEUR de la catégorie
  panel.querySelectorAll("[data-pmove]").forEach(b => b.addEventListener("click", () => moveProductInCat(b.dataset.id, b.dataset.pmove)));
}

// Réordonne un produit parmi ses voisins de la MÊME catégorie
async function moveProductInCat(id, direction){
  const prod = state.products.find(p => p.id === id);
  const siblings = state.products
    .filter(p => p.category_id === prod.category_id)
    .sort((a,b) => (a.position||0) - (b.position||0));
  const idx = siblings.findIndex(p => p.id === id);
  const swapIdx = direction === "up" ? idx-1 : idx+1;
  if(swapIdx < 0 || swapIdx >= siblings.length) return;
  const a = siblings[idx], b = siblings[swapIdx];
  await Promise.all([
    sb.from("products").update({ position: b.position }).eq("id", a.id),
    sb.from("products").update({ position: a.position }).eq("id", b.id)
  ]);
  await loadAll();
  renderAdminProducts();
}

    ? `Cette catégorie contient ${count} produit(s). Les supprimer aussi ?`
    : "Supprimer cette catégorie ?";

  if(count) await sb.from("products").delete().eq("category_id", id);
  await sb.from("categories").delete().eq("id", id);
  await loadAll();
  renderAdminCategories();
}

/* Réordonner un produit / une catégorie en échangeant les positions */
async function moveItem(table, id, direction){
  const list = table === "products" ? state.products : state.categories;
  const idx = list.findIndex(x=>x.id===id);
  const swapIdx = direction === "up" ? idx-1 : idx+1;
  if(swapIdx < 0 || swapIdx >= list.length) return;

  const a = list[idx], b = list[swapIdx];
  // On échange les valeurs de "position" entre les deux éléments
  await Promise.all([
    sb.from(table).update({ position: b.position }).eq("id", a.id),
    sb.from(table).update({ position: a.position }).eq("id", b.id)
  ]);
  await loadAll();
  table === "products" ? renderAdminProducts() : renderAdminCategories();
}

/* ----------------------- RÉGLAGES ----------------------- */
function renderAdminSettings(){
  const panel = $("#adminPanel");
  panel.innerHTML = `
    <div class="section-head"><h2>🔒 Mon mot de passe</h2></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">Modifiez le mot de passe de votre compte administrateur.</p>
    <div class="field"><label>Nouveau mot de passe</label>
      <input type="password" id="pwNew" placeholder="Au moins 6 caractères" autocomplete="new-password"></div>
    <div class="field"><label>Confirmer le mot de passe</label>
      <input type="password" id="pwConfirm" placeholder="Retapez le mot de passe" autocomplete="new-password"></div>
    <div id="pwNote"></div>
    <button class="btn btn--primary btn--block" id="savePassword">Changer le mot de passe</button>`;

  // Changement du mot de passe du compte admin connecté
  $("#savePassword").addEventListener("click", async () => {
    const np = $("#pwNew").value;
    const cf = $("#pwConfirm").value;
    const note = $("#pwNote");
    if(np.length < 6){
      note.innerHTML = `<div class="note note--err">Le mot de passe doit faire au moins 6 caractères.</div>`; return;
    }
    if(np !== cf){
      note.innerHTML = `<div class="note note--err">Les deux mots de passe ne correspondent pas.</div>`; return;
    }
    const btn = $("#savePassword"); btn.disabled = true; btn.textContent = "Modification…";
    const { error } = await sb.auth.updateUser({ password: np });
    btn.disabled = false; btn.textContent = "Changer le mot de passe";
    if(error){
      note.innerHTML = `<div class="note note--err">${escapeHtml(error.message)}</div>`; return;
    }
    $("#pwNew").value = ""; $("#pwConfirm").value = "";
    note.innerHTML = `<div class="note note--ok">Mot de passe modifié ✓ Il sera demandé à la prochaine connexion.</div>`;
  });
}

/* ===================================================================
   ░░  RECADRAGE + COMPRESSION + UPLOAD DES PHOTOS  ░░
=================================================================== */
let cropperInstance = null;

function openCropper(file, onDone, opts={}){
  // opts.aspect = ratio de recadrage (1 = carré par défaut, 1.6 = bannière)
  // opts.width / opts.height = dimensions de sortie
  const aspect = opts.aspect || 1;
  const outW = opts.width || 1000;
  const outH = opts.height || 1000;
  const reader = new FileReader();
  reader.onload = () => {
    modalRoot.insertAdjacentHTML("beforeend", `
      <div class="modal" id="cropModal" style="z-index:120;">
        <div class="modal__panel" style="align-self:center;margin:auto;border-radius:24px;">
          <div class="modal__head">
            <h3>✂️ Recadrer la photo</h3>
            <button class="modal__close" id="cropCancel">✕</button>
          </div>
          <div class="crop-wrap"><img id="cropImg" src="${reader.result}"></div>
          <div id="cropNote"></div>
          <div class="modal__footer">
            <button class="btn btn--ghost" id="cropCancel2" style="flex:1;">Annuler</button>
            <button class="btn btn--primary" id="cropOk" style="flex:2;">Valider</button>
          </div>
        </div>
      </div>`);

    // Initialisation de Cropper.js (ratio selon le contexte : carré ou bannière)
    const img = $("#cropImg");
    cropperInstance = new Cropper(img, {
      aspectRatio: aspect,
      viewMode: 1,
      autoCropArea: 1,
      background: false
    });

    const cancel = () => { destroyCropper(); $("#cropModal")?.remove(); };
    $("#cropCancel").addEventListener("click", cancel);
    $("#cropCancel2").addEventListener("click", cancel);

    $("#cropOk").addEventListener("click", async () => {
      const btn = $("#cropOk"); btn.disabled = true; btn.textContent = "Envoi…";
      try{
        // 1) On recadre + redimensionne aux dimensions demandées
        const canvas = cropperInstance.getCroppedCanvas({
          width:outW, height:outH, imageSmoothingQuality:"high"
        });
        // 2) Compression automatique en JPEG (qualité 0.82)
        const blob = await new Promise(res => canvas.toBlob(res, "image/jpeg", 0.82));
        // 3) Upload dans Supabase Storage
        const fileName = `${crypto.randomUUID()}.jpg`;
        const { error: upErr } = await sb.storage.from(BUCKET)
          .upload(fileName, blob, { contentType:"image/jpeg", upsert:false });
        if(upErr) throw upErr;
        // 4) Récupération de l'URL publique
        const { data } = sb.storage.from(BUCKET).getPublicUrl(fileName);
        destroyCropper(); $("#cropModal")?.remove();
        onDone(data.publicUrl);
      }catch(err){
        $("#cropNote").innerHTML = `<div class="note note--err">Échec de l'envoi : ${escapeHtml(err.message||err)}</div>`;
        btn.disabled = false; btn.textContent = "Réessayer";
      }
    });
  };
  reader.readAsDataURL(file);
}

function destroyCropper(){
  if(cropperInstance){ cropperInstance.destroy(); cropperInstance = null; }
}

/* ===================================================================
   FERMETURE DES MODALES
=================================================================== */
function closeModal(){
  destroyCropper();
  modalRoot.innerHTML = "";
}

/* ===================================================================
   ░░  POINT D'ENTRÉE / DÉMARRAGE  ░░
=================================================================== */
async function init(){
  // Vérification rapide de la configuration
  if(SUPABASE_URL.includes("VOTRE-PROJET")){
    app.innerHTML = `<div class="empty-state">
      <div class="empty-state__emoji">🔧</div>
      <b>Configuration requise</b><br>
      Renseignez <code>SUPABASE_URL</code> et <code>SUPABASE_ANON_KEY</code><br>en haut du fichier index.html.
    </div>`;
    return;
  }

  const ok = await loadAll();
  if(!ok) return;

  // Retour depuis un lien "mot de passe oublié" reçu par e-mail :
  // on affiche l'écran "nouveau mot de passe" (et on n'entre pas dans l'admin)
  if(IS_RECOVERY){
    await sb.auth.getSession(); // laisse Supabase traiter le jeton présent dans l'URL
    renderPublic();
    openRecoveryModal();
    return;
  }

  // Accès admin via l'URL secrète ?admin=1
  const params = new URLSearchParams(location.search);
  const wantsAdmin = params.get("admin") === "1";

  // On vérifie s'il existe déjà une session admin active (rafraîchissement de page)
  const { data:{ session } } = await sb.auth.getSession();
  state.isAdmin = !!session;

  if(wantsAdmin){
    if(state.isAdmin){ enterAdmin(); }
    else { renderPublic(); openLoginModal(); } // on montre le menu en fond + la connexion
  } else {
    renderPublic();
  }
}

init();
</script>
